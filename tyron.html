<section class="hero">

<div class="hero-left">

<h1>AI Virtual Try-On</h1>

<p>

Upload your face and full body photo.

Enter your height and weight.

Our AI recommends your perfect size and shows a virtual preview.

</p>

<div class="hero-right">

<img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80">

<section>

<h2>Create Your AI Profile</h2>

<div style="max-width:800px;margin:auto;background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1);">

<label>

Full Name

</label>

<input
type="text"
placeholder="Your Name"
style="width:100%;padding:15px;margin:10px 0 20px;border-radius:10px;border:1px solid #ccc;">

<label>

Upload Face Photo

</label>

<input
type="file"
accept="image/*"
style="width:100%;padding:15px;margin-bottom:20px;">

<label>

Upload Full Body Photo

</label>

<input
type="file"
accept="image/*"
style="width:100%;padding:15px;margin-bottom:20px;">

<label>

Height (cm)

</label>

<input
type="number"
placeholder="170"
style="width:100%;padding:15px;margin-bottom:20px;border-radius:10px;border:1px solid #ccc;">

<label>

Weight (kg)

</label>

<input
type="number"
placeholder="65"
style="width:100%;padding:15px;margin-bottom:20px;border-radius:10px;border:1px solid #ccc;">

<label>

Gender

</label>

<select
style="width:100%;padding:15px;margin-bottom:20px;border-radius:10px;">

<option>Male</option>

<option>Female</option>

<option>Other</option>

</select>

<label>

Body Type

</label>

<select
style="width:100%;padding:15px;margin-bottom:20px;border-radius:10px;">

<option>Slim</option>

<option>Athletic</option>

<option>Average</option>

<option>Heavy</option>

</select>

<button class="btn-primary" style="width:100%;">

Generate AI Preview

</button>

</div>

</section>
