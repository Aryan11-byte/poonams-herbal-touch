<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nandé Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#f5f7fb;
}

.dashboard{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#111827;
color:white;
padding:25px;
position:fixed;
height:100%;
}

.sidebar h2{
margin-bottom:40px;
text-align:center;
font-size:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:14px;
margin-bottom:10px;
border-radius:10px;
transition:.3s;
}

.sidebar a:hover{
background:#d4af37;
color:black;
}

.main{
margin-left:260px;
width:100%;
padding:30px;
}

/* TOPBAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.topbar h1{
font-size:32px;
}

.search-box input{
padding:12px;
width:280px;
border-radius:10px;
border:1px solid #ddd;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
}

.card h3{
color:#666;
font-size:16px;
}

.card h1{
margin-top:15px;
font-size:36px;
}

/* TABLE */

.section{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.06);
margin-bottom:30px;
}

.section h2{
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table th{
background:#111827;
color:white;
padding:15px;
}

table td{
padding:15px;
border-bottom:1px solid #eee;
text-align:center;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.add-btn{
background:#16a34a;
color:white;
}

.edit-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#dc2626;
color:white;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.pending{
background:#fde68a;
}

.shipped{
background:#93c5fd;
}

.delivered{
background:#86efac;
}

</style>

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Nandé</h2>

<a href="#">🏠 Dashboard</a>

<a href="#">📦 Orders</a>

<a href="#">👕 Products</a>

<a href="#">👥 Customers</a>

<a href="#">⭐ Reviews</a>

<a href="#">📊 Analytics</a>

<a href="index.html">🚪 Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h1>Admin Dashboard</h1>

<div class="search-box">

<input
type="text"
placeholder="Search...">

</div>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">

<h3>Total Revenue</h3>

<h1 id="revenue">₹0</h1>

</div>

<div class="card">

<h3>Total Orders</h3>

<h1 id="ordersCount">0</h1>

</div>

<div class="card">

<h3>Customers</h3>

<h1 id="customerCount">0</h1>

</div>

<div class="card">

<h3>Products</h3>

<h1 id="productCount">0</h1>

</div>

</div>

<!-- PRODUCTS -->

<div class="section">

<h2>Products</h2>

<br>

<button
class="add-btn"
onclick="showAddProductForm()">

+ Add Product

</button>

<br><br>

<table>

<thead>

<tr>

<th>Image</th>

<th>Name</th>

<th>Category</th>

<th>Price</th>

<th>Stock</th>

<th>Action</th>

</tr>

</thead>

<tbody id="productsTable">

<tr>

<td colspan="6">

Loading Products...

</td>

</tr>

</tbody>

</table>

</div>
<!-- ORDERS SECTION -->

<div class="section">

<h2>Orders</h2>

<table>

<thead>

<tr>

<th>Order ID</th>

<th>Customer</th>

<th>Total</th>

<th>Status</th>

</tr>

</thead>

<tbody id="ordersTable">

<tr>

<td colspan="4">

Loading Orders...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- FIREBASE -->

<script type="module">

import {
collection,
getDocs,
addDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { db } from "./firebase.js";

const productsTable =
document.getElementById("productsTable");

const ordersTable =
document.getElementById("ordersTable");

const productCount =
document.getElementById("productCount");

const ordersCount =
document.getElementById("ordersCount");

const revenue =
document.getElementById("revenue");

const customerCount =
document.getElementById("customerCount");

/* LOAD PRODUCTS */

async function loadProducts(){

const snapshot =
await getDocs(
collection(db,"products")
);

productsTable.innerHTML="";

productCount.innerHTML =
snapshot.size;

if(snapshot.empty){

productsTable.innerHTML=`

<tr>

<td colspan="6">

No Products Found

</td>

</tr>

`;

return;

}

snapshot.forEach((document)=>{

const product =
document.data();

productsTable.innerHTML += `

<tr>

<td>

<img
src="${product.image}"
width="60">

</td>

<td>${product.name}</td>

<td>${product.category}</td>

<td>₹${product.price}</td>

<td>${product.stock}</td>

<td>

<button
class="delete-btn"
onclick="deleteProduct('${document.id}')">

Delete

</button>

</td>

</tr>

`;

});

}

/* LOAD ORDERS */

async function loadOrders(){

const snapshot =
await getDocs(
collection(db,"orders")
);

ordersTable.innerHTML="";

ordersCount.innerHTML =
snapshot.size;

let totalRevenue = 0;

let customers = new Set();

if(snapshot.empty){

ordersTable.innerHTML=`

<tr>

<td colspan="4">

No Orders Found

</td>

</tr>

`;

return;

}

snapshot.forEach((document)=>{

const order =
document.data();

totalRevenue +=
Number(order.total || 0);

customers.add(
order.email || order.customerName
);

ordersTable.innerHTML += `

<tr>

<td>${order.orderId || document.id}</td>

<td>${order.customerName || "Customer"}</td>

<td>₹${order.total || 0}</td>

<td>

<span class="status pending">

${order.status || "Pending"}

</span>

</td>

</tr>

`;

});

revenue.innerHTML =
"₹" +
totalRevenue.toLocaleString();

customerCount.innerHTML =
customers.size;

}

/* ADD PRODUCT */

window.showAddProductForm =
async function(){

const name =
prompt("Product Name");

if(!name) return;

const category =
prompt("Category");

const price =
prompt("Price");

const stock =
prompt("Stock");

const image =
prompt("Image URL");

await addDoc(
collection(db,"products"),
{
name:name,
category:category,
price:Number(price),
stock:Number(stock),
image:image
}
);

alert(
"Product Added Successfully"
);

loadProducts();

}

/* DELETE PRODUCT */

window.deleteProduct =
async function(id){

if(confirm(
"Delete Product?"
)){

await deleteDoc(
doc(db,"products",id)
);

loadProducts();

}

}

/* INITIAL LOAD */

loadProducts();

loadOrders();

</script>

</body>

</html>
